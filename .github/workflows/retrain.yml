name: Daily retrain

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: push-main
  cancel-in-progress: false

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Retrain (downloads fresh results, refits, writes model.json)
        run: python train.py
      - name: Commit model.json if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add model.json
          if git diff --staged --quiet; then
            echo "model.json unchanged — nothing to commit."
          else
            git commit -m "chore: daily model retrain [skip ci]"
            git pull --rebase --autostash origin main || true
            git push
          fi
